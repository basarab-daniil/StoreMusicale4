<div class="container-login">
  <div class="box-login">
    <h2 class="titolo-login">Accedi allo Store</h2>

    @if (errorMessage) {
      <div class="alert-errore">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="label-form">Email:</label>
        <input type="email" name="email" [(ngModel)]="email" class="input-form" required />
      </div>

      <div class="form-group-ultimo">
        <label class="label-form">Password:</label>
        <input type="password" name="password" [(ngModel)]="password" class="input-form" required />
      </div>

      <button type="submit" class="btn-accedi">
        Accedi
      </button>
    </form>

    <p class="testo-registrazione">
      Non hai un account? <a routerLink="/register" class="link-registrazione">Registrati qui</a>
    </p>
  </div>
</div>
